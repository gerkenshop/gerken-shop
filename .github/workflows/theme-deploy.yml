name: Deploy Shopify Theme

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the uploaded theme live
        required: true
        default: "false"
      environment:
        description: Deployment target
        required: true
        default: staging

concurrency:
  group: shopify-theme-deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON config
        run: npm run check:json

      - name: Verify Shopify deployment secrets
        shell: bash
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          if [ -z "$SHOPIFY_STORE" ]; then
            echo "Missing GitHub secret: SHOPIFY_STORE"
            exit 1
          fi
          if [ -z "$SHOPIFY_CLI_THEME_TOKEN" ]; then
            echo "Missing GitHub secret: SHOPIFY_CLI_THEME_TOKEN"
            exit 1
          fi

      - name: Deploy unpublished or update existing theme
        shell: bash
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.publish }}" = "true" ]; then
            npx shopify theme push --path . --json --publish
          elif [ -n "${SHOPIFY_FLAG_THEME_ID}" ]; then
            npx shopify theme push --path . --json --theme "${SHOPIFY_FLAG_THEME_ID}"
          else
            npx shopify theme push --path . --json --unpublished
          fi
