name: Theme Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify lockfile exists
        shell: bash
        run: |
          test -f package-lock.json || (echo "package-lock.json is missing" && exit 1)

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Validate JSON config
        run: npm run check:json

      - name: Package Shopify theme
        run: npm run theme:package
